<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> Book Tracker
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" sec:authorize="isAuthenticated()">
                    <i class="bi bi-person-circle"></i> 
                    <span sec:authentication="name">User</span>
                </span>
                <div sec:authorize="isAnonymous()">
                    <a href="/perform_login" class="btn btn-light">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-light">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">My Books</h1>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/books/new" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Add New Book
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(books)}" class="alert alert-info">
            <i class="bi bi-info-circle"></i> No books found. Add your first book to get started!
        </div>

        <div class="row" th:if="${!#lists.isEmpty(books)}">
            <div class="col-md-6 col-lg-4 mb-4" th:each="book : ${books}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${book.title}">Book Title</h5>
                        <p class="card-text text-muted mb-2">
                            <i class="bi bi-person"></i> by <span th:text="${book.author}">Author</span>
                        </p>
                        
                        <div class="mb-3">
                            <span class="badge"
                                  th:class="${book.status == T(com.example.booktracker.model.BookStatus).READING ? 'bg-primary' : 
                                            book.status == T(com.example.booktracker.model.BookStatus).COMPLETED ? 'bg-success' : 'bg-warning'}"
                                  th:text="${#strings.capitalize(#strings.replace(book.status, '_', ' '))}">
                                Status
                            </span>
                        </div>

                        <div th:if="${book.rating != null}" class="mb-3">
                            <span th:each="i : ${#numbers.sequence(1, book.rating)}">
                                <i class="bi bi-star-fill text-warning"></i>
                            </span>
                            <span th:each="i : ${#numbers.sequence(book.rating + 1, 5)}" th:if="${book.rating < 5}">
                                <i class="bi bi-star text-warning"></i>
                            </span>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <div class="d-flex gap-2">
                            <a th:href="@{/books/edit/{id}(id=${book.id})}" 
                               class="btn btn-sm btn-outline-primary flex-grow-1">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <form th:action="@{/books/delete/{id}(id=${book.id})}" 
                                  method="post"
                                  class="flex-grow-1">
                                <button type="submit" 
                                        class="btn btn-sm btn-outline-danger w-100"
                                        onclick="return confirm('Are you sure you want to delete this book?');">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
