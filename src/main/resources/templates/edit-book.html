<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - Book Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> Book Tracker
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Book</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/books/update/{id}(id=${book.id})}" th:object="${book}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control" 
                                       id="title" 
                                       th:field="*{title}"
                                       required
                                       placeholder="Enter book title">
                            </div>

                            <div class="mb-3">
                                <label for="author" class="form-label">Author <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control" 
                                       id="author" 
                                       th:field="*{author}"
                                       required
                                       placeholder="Enter author name">
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                                <select class="form-select" 
                                        id="status" 
                                        th:field="*{status}"
                                        required>
                                    <option value="">Select status</option>
                                    <option th:each="status : ${statuses}" 
                                            th:value="${status}"
                                            th:text="${#strings.capitalize(#strings.replace(status, '_', ' '))}">
                                        Status
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="rating" class="form-label">Rating (1-5)</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="rating" 
                                       th:field="*{rating}"
                                       min="1" 
                                       max="5"
                                       placeholder="Leave blank if not rated">
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <a href="/" class="btn btn-secondary flex-grow-1">
                                    <i class="bi bi-x-lg"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary flex-grow-1">
                                    <i class="bi bi-check-lg"></i> Update Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
