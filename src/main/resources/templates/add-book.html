<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Book - Book Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-book"></i> Book Tracker
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-plus-lg"></i> Add New Book</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/books}" th:object="${book}" method="post">
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                                <i class="bi bi-exclamation-triangle"></i>
                                <span th:each="err : ${#fields.globalErrors()}" th:text="${err}">Global error</span>
                            </div>

                            <div class="mb-3">
                                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control" 
                                       id="title" 
                                       th:field="*{title}"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                                       placeholder="Enter book title">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:each="err : ${#fields.errors('title')}" th:text="${err}">Title error</span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="author" class="form-label">Author <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control" 
                                       id="author" 
                                       th:field="*{author}"
                                       th:classappend="${#fields.hasErrors('author')} ? 'is-invalid' : ''"
                                       placeholder="Enter author name">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:each="err : ${#fields.errors('author')}" th:text="${err}">Author error</span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                                <select class="form-select" 
                                        id="status" 
                                        th:field="*{status}"
                                        th:classappend="${#fields.hasErrors('status')} ? 'is-invalid' : ''">
                                    <option value="">Select status</option>
                                    <option th:each="status : ${statuses}" 
                                            th:value="${status}"
                                            th:text="${#strings.capitalize(#strings.replace(status, '_', ' '))}">
                                        Status
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:each="err : ${#fields.errors('status')}" th:text="${err}">Status error</span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="rating" class="form-label">Rating (1-5)</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="rating" 
                                       th:field="*{rating}"
                                       th:classappend="${#fields.hasErrors('rating')} ? 'is-invalid' : ''"
                                       min="1" 
                                       max="5"
                                       placeholder="Leave blank if not rated">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('rating')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:each="err : ${#fields.errors('rating')}" th:text="${err}">Rating error</span>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <a href="/" class="btn btn-secondary flex-grow-1">
                                    <i class="bi bi-x-lg"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary flex-grow-1">
                                    <i class="bi bi-check-lg"></i> Save Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
